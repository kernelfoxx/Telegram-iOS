name: CI

on:
  push:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: '500'

      - name: Fix Submodule URLs
        run: |
          git config --file .gitmodules submodule."submodules/TgVoipWebrtc/tgcalls".url "https://github.com/TelegramMessenger/tgcalls.git"
          git config --file .gitmodules submodule."submodules/rlottie/rlottie".url "https://github.com/TelegramMessenger/rlottie.git"
          git submodule sync
          git submodule update --init --recursive --depth=500

      - name: Set active Xcode path
        run: |
          XCODE_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["xcode"]);')
          sudo xcode-select -s /Applications/Xcode_$XCODE_VERSION.app/Contents/Developer

      - name: Create canonical source directory
        run: |
          set -x
          sudo mkdir -p /Users/Shared
          cp -R $GITHUB_WORKSPACE /Users/Shared/
          mv /Users/Shared/$(basename $GITHUB_WORKSPACE) /Users/Shared/telegram-ios

      - name: Build the App
        run: |
          set -x
          SOURCE_DIR=/Users/Shared/telegram-ios
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"
          cd $SOURCE_DIR
          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"
          export APP_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["app"]);')
          export COMMIT_COUNT=$(git rev-list --count HEAD)
          export COMMIT_COUNT="$(($COMMIT_COUNT+$BUILD_NUMBER_OFFSET))"
          export BUILD_NUMBER="$COMMIT_COUNT"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs
          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            build \
            --configurationPath="build-system/appstore-configuration.json" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=release_arm64 \
            --buildNumber="$BUILD_NUMBER" \
            --continueOnError

          OUTPUT_PATH="build/artifacts"
          rm -rf "$OUTPUT_PATH"
          mkdir -p "$OUTPUT_PATH"

          echo "🔍 Looking for IPA file..."
          shopt -s nullglob
          for f in bazel-bin/Telegram/Telegram.ipa \
                   bazel-out/applebin_ios-*/bin/Telegram/Telegram.ipa \
                   bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/Telegram.ipa; do
            if [ -f "$f" ]; then
              cp -v "$f" "$OUTPUT_PATH/"
              echo "✅ Successfully copied: $f"
              break
            fi
          done

          # DSYMs (без ошибки если нет)
          mkdir -p build/DSYMs
          for f in bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/*.dSYM; do
            cp -R "$f" build/DSYMs/ 2>/dev/null || true
          done
          if [ -d "build/DSYMs" ] && [ "$(ls -A build/DSYMs 2>/dev/null)" ]; then
            zip -r "./$OUTPUT_PATH/Telegram.DSYMs.zip" build/DSYMs 1>/dev/null || true
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-Build-${{ env.BUILD_NUMBER }}
          path: /Users/Shared/telegram-ios/build/artifacts/*
          retention-days: 30

      # Опциональный релиз (не будет ломать билд при ошибке 403)
      - name: Create GitHub Release (optional)
        if: always()
        uses: softprops/action-gh-release@v2
        continue-on-error: true
        with:
          tag_name: build-${{ env.BUILD_NUMBER }}
          name: Telegram ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }})
          body: "An unsigned build of Telegram for iOS ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }})"
          files: |
            /Users/Shared/telegram-ios/build/artifacts/Telegram.ipa
            /Users/Shared/telegram-ios/build/artifacts/Telegram.DSYMs.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
